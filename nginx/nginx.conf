# ── FreshVision AI — Nginx Production Config ───────────────────────────────
# Handles: TLS termination, HTTPS redirect, rate limiting, gzip,
#          security headers, reverse proxy to FastAPI + React SPA.

# Rate limiting zones
limit_req_zone  $binary_remote_addr  zone=api_limit:10m      rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=inspect_limit:10m  rate=10r/m;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Request limits ───────────────────────────────────────────────────────
    client_max_body_size    12M;   # 10 MB image + form fields
    client_body_timeout     30s;
    client_header_timeout   10s;
    keepalive_timeout       65s;
    send_timeout            30s;
    limit_conn conn_limit 20;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;

    # ── API proxy → FastAPI ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;   # allow time for inference on i3
        proxy_send_timeout 30s;

        # Don't expose backend headers
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
    }

    # Tighter rate limit for the heavy inspection endpoint
    location /api/inspect {
        limit_req zone=inspect_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 12M;
    }

    # API docs (allow in staging, block in production via env)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend:8000;
        access_log off;
    }

    # ── React SPA ────────────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }

        # SPA fallback — all unknown paths serve index.html
        try_files $uri $uri/ /index.html;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* \.(php|asp|aspx|jsp|cgi|sh|bash)$ {
        deny all;
        return 404;
    }
}
