# ── FreshVision AI — Nginx HTTP-only config (dev / demo) ───────────────────
# For production deploy with TLS use nginx.conf instead.

limit_req_zone  $binary_remote_addr  zone=api_limit:10m      rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=inspect_limit:10m  rate=10r/m;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size  12M;
    client_body_timeout   30s;
    keepalive_timeout     65s;
    limit_conn conn_limit 20;

    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-Frame-Options        "DENY"                            always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    gzip on; gzip_vary on; gzip_comp_level 5; gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/inspect {
        limit_req zone=inspect_limit burst=5 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 12M;
    }

    location ~ ^/(docs|redoc|openapi.json|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.  { deny all; return 404; }
    location ~* \.(php|asp|jsp|cgi|sh)$ { deny all; return 404; }
}
