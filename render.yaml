# Render Blueprint — https://render.com/docs/blueprint-spec
# Free tier: 512MB RAM, shared CPU, sleeps after 15 min inactivity
# Deploy: connect GitHub repo → New → Blueprint → select this file

services:
  - type: web
    name: freshvision-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FRESHVISION_JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: freshvision-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false                  # Fill in from Supabase dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: YOLO_DEVICE
        value: cpu
      - key: YOLO_IMGSZ
        value: "320"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: CORS_ORIGINS
        sync: false                  # Fill in with your Vercel frontend URL

databases:
  - name: freshvision-db
    plan: free
    databaseName: freshvision
    user: freshvision
