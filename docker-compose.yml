version: "3.9"

# ── FreshVision AI — Production Docker Compose ──────────────────────────────
# Quick start (HTTP):
#   cp .env.example .env  &&  nano .env   # set FRESHVISION_JWT_SECRET
#   docker compose up --build -d
#   open http://localhost
#
# Quick start (HTTPS):
#   bash scripts/gen_selfsigned_cert.sh   # or scripts/letsencrypt.sh
#   COMPOSE_PROFILES=https docker compose up --build -d
#   open https://localhost
#
# Seed demo data (run once after first boot):
#   docker compose exec backend python -m scripts.seed_demo_data --days 30

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freshvision-backend
    restart: unless-stopped
    environment:
      FRESHVISION_JWT_SECRET:   ${FRESHVISION_JWT_SECRET:?Set FRESHVISION_JWT_SECRET in .env}
      FRESHVISION_YOLO_WEIGHTS: ${FRESHVISION_YOLO_WEIGHTS:-yolov8n.pt}
      FRESHVISION_STORAGE_DIR:  /data
      LOG_LEVEL:                ${LOG_LEVEL:-INFO}
      CORS_ORIGINS:             ${CORS_ORIGINS:-http://localhost,https://localhost}
      OMP_NUM_THREADS:          "2"
      OPENBLAS_NUM_THREADS:     "2"
      MKL_NUM_THREADS:          "2"
      INFERENCE_THREADS:        "2"
      YOLO_DEVICE:              "cpu"
      YOLO_IMGSZ:               "320"
    volumes:
      - freshvision_data:/data
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: "1.5G"
        reservations:
          memory: "512M"
    healthcheck:
      test: ["CMD","python3","-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health',timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [freshvision_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: freshvision-frontend
    restart: unless-stopped
    volumes:
      - ./nginx/nginx_http.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks: [freshvision_net]

  frontend_https:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: freshvision-frontend-https
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      backend:
        condition: service_healthy
    networks: [freshvision_net]
    profiles: [https]

volumes:
  freshvision_data:
    name: freshvision_data

networks:
  freshvision_net:
    name: freshvision_net
    driver: bridge
