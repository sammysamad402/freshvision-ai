name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install deps
        working-directory: backend
        run: pip install --upgrade pip && pip install -r requirements.txt pytest pytest-asyncio
      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: ""   # SQLite in CI

  # ── Frontend build ────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://placeholder.hf.space

  # ── Deploy backend to HF Spaces (on push to main) ─────────────────────────
  deploy-backend:
    name: Deploy → Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Build HF Space folder
        run: bash scripts/build_hf_space.sh

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config --global user.email "ci@freshvision.ai"
          git config --global user.name  "FreshVision CI"

          git clone https://USER:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/freshvision-backend hf_deploy
          cp -r hf_space/. hf_deploy/
          cd hf_deploy
          git add -A
          git diff --cached --quiet || git commit -m "deploy: ${{ github.sha }}"
          git push
        # Only runs if HF_TOKEN + HF_USERNAME secrets are configured in repo Settings
        # Without secrets, this step is safely skipped

  # ── Deploy frontend to Vercel (automatic via Vercel GitHub integration) ───
  # No action needed here — Vercel auto-deploys on push when connected to repo.
  # See: https://vercel.com/docs/concepts/git
